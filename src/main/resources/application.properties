spring.application.name=ecommerce-backend

# MySQL configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
security.jwt.secret-key=${JWT_SECRET:}
security.jwt.expiration-ms=86400000

# Stripe configuration
payment.stripe.secret-key=${STRIPE_SECRET_KEY:}

# Optional default admin bootstrap (set password to enable auto-create)
app.default-admin-email=${DEFAULT_ADMIN_EMAIL:admin@shop.com}
app.default-admin-password=${DEFAULT_ADMIN_PASSWORD:}

server.port=8080
